name: Build Engine Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Calculate next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          BASE_VERSION="1.1"

          git fetch --tags

          LAST_PATCH=$(git tag -l "v${BASE_VERSION}.*" \
            | sed "s/v${BASE_VERSION}.//" \
            | sort -n \
            | tail -n1)

          if [ -z "$LAST_PATCH" ]; then
            NEXT_PATCH=0
          else
            NEXT_PATCH=$((LAST_PATCH + 1))
          fi

          VERSION="${BASE_VERSION}.${NEXT_PATCH}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version will be $VERSION"

  build:
    name: Build on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pkg: panteao-engine-linux-x64
            engine_dir: sdk/engines/linux-x64
            bin_name: panteao-engine
            artifact_name: engine-linux-x64

          - os: windows-latest
            pkg: panteao-engine-win32-x64
            engine_dir: sdk/engines/win32-x64
            bin_name: panteao-engine.exe
            artifact_name: engine-win32-x64

          - os: macos-latest
            pkg: panteao-engine-darwin-arm64
            engine_dir: sdk/engines/darwin-arm64
            bin_name: panteao-engine
            artifact_name: engine-darwin-arm64

          - os: macos-15-intel
            pkg: panteao-engine-darwin-x64
            engine_dir: sdk/engines/darwin-x64
            bin_name: panteao-engine
            artifact_name: engine-darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Build native binary
        run: ./gradlew copyNativeEngine
        shell: bash

      - name: Copy binary into engine package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ${{ matrix.engine_dir }}/bin
          cp bin/panteao-engine ${{ matrix.engine_dir }}/bin/panteao-engine
          chmod +x ${{ matrix.engine_dir }}/bin/panteao-engine

      - name: Copy binary into engine package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ matrix.engine_dir }}/bin"
          Copy-Item "bin/${{ matrix.bin_name }}" "${{ matrix.engine_dir }}/bin/${{ matrix.bin_name }}"

      - name: Bump package version
        working-directory: ${{ matrix.engine_dir }}
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            pkg.description = (pkg.description || '').replace(' (coming soon)', '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Upload engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.prepare.outputs.version }}
          path: ${{ matrix.engine_dir }}/
          retention-days: 30

  # ── Publicação no npm ────────────────────────────────────────────────────
  publish:
    name: Publish ${{ matrix.pkg }} to npm
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always()

    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: panteao-engine-linux-x64
            artifact_name: engine-linux-x64
            engine_dir: sdk/engines/linux-x64

          - pkg: panteao-engine-win32-x64
            artifact_name: engine-win32-x64
            engine_dir: sdk/engines/win32-x64

          - pkg: panteao-engine-darwin-arm64
            artifact_name: engine-darwin-arm64
            engine_dir: sdk/engines/darwin-arm64

          - pkg: panteao-engine-darwin-x64
            artifact_name: engine-darwin-x64
            engine_dir: sdk/engines/darwin-x64

    steps:
      - name: Download engine artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.prepare.outputs.version }}
          path: ${{ matrix.engine_dir }}
        continue-on-error: true

      - name: Check if artifact exists
        id: check
        shell: bash
        run: |
          if [ -f "${{ matrix.engine_dir }}/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Make binary executable
        if: steps.check.outputs.exists == 'true'
        run: chmod +x ${{ matrix.engine_dir }}/bin/* 2>/dev/null || true
        shell: bash

      - name: Publish to npm
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.engine_dir }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}