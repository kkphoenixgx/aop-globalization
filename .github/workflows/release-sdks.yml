name: Build, Package and Release SDKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-and-publish:
    name: GitHub Release & Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Package SDKs as release assets
        run: |
          mkdir -p dist
          tar -czf dist/panteao-sdk-javascript.tar.gz -C sdk/javascript .
          tar -czf dist/panteao-sdk-typescript.tar.gz -C sdk/typescript .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/panteao-sdk-javascript.tar.gz
            dist/panteao-sdk-typescript.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish JavaScript SDK to npm
        working-directory: sdk/javascript
        run: npm publish --access public || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci || npm install
          npm run build

      - name: Publish TypeScript SDK to npm
        working-directory: sdk/typescript
        run: npm publish --access public || echo "Already published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
