name: Release & Publish SDKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  actions: write

concurrency:
  group: release-sdks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Calculate next version
    runs-on: ubuntu-latest
    environment: release
    if: "contains(github.event.head_commit.message, '+version') || github.event_name == 'workflow_dispatch'"
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Next Version
        id: version
        run: |
          BASE_VERSION="1.1"
          git fetch --tags 2>/dev/null
          LAST_PATCH=$(git tag -l "v${BASE_VERSION}.*" | sed "s/v${BASE_VERSION}.//" | sort -n | tail -n1)
          [ -z "$LAST_PATCH" ] && NEXT_PATCH=0 || NEXT_PATCH=$((LAST_PATCH + 1))
          
          NPM_VER=$(npm view panteao-js version 2>/dev/null || echo "0.0.0")
          PYPI_VER=$(curl -s https://pypi.org/pypi/panteao-py/json | jq -r '.info.version' 2>/dev/null || echo "0.0.0")
          NUGET_VER=$(curl -s "https://api.nuget.org/v3-flatcontainer/panteao/index.json" | jq -r '.versions[-1]' 2>/dev/null || echo "0.0.0")
          DART_VER=$(curl -s https://pub.dev/api/packages/panteao | jq -r '.latest.version' 2>/dev/null || echo "0.0.0")
          ENGINE_VER=$(npm view panteao-engine-linux-x64 version 2>/dev/null || echo "0.0.0")
          
          MAX_PATCH=$NEXT_PATCH
          for VER in $NPM_VER $PYPI_VER $NUGET_VER $DART_VER $ENGINE_VER; do
            PATCH=$(echo $VER | awk -F. '{print $3}')
            [ -z "$PATCH" ] || [ "$PATCH" == "null" ] && PATCH=0
            if [ "$PATCH" -ge "$MAX_PATCH" ]; then
              MAX_PATCH=$((PATCH + 1))
            fi
          done
          
          FINAL_VERSION="${BASE_VERSION}.${MAX_PATCH}"
          echo "Calculated Version: $FINAL_VERSION"
          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version $FINAL_VERSION"

  publish-sdks:
    name: Publish SDKs
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-generate CHANGELOG.md
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## ${{ needs.prepare.outputs.version }}" > LATEST.md
          echo "" >> LATEST.md
          if [ -n "$LAST_TAG" ]; then
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s" >> LATEST.md
          else
            git log -n 10 --pretty=format:"- %s" >> LATEST.md
          fi
          echo "" >> LATEST.md
          
          # Prepend for Dart (and future SDKs that need it)
          if [ -f sdk/dart/CHANGELOG.md ]; then
            cat LATEST.md sdk/dart/CHANGELOG.md > temp_changelog.md
            mv temp_changelog.md sdk/dart/CHANGELOG.md
          else
            cp LATEST.md sdk/dart/CHANGELOG.md
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump JavaScript SDK version
        working-directory: sdk/javascript
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish JavaScript SDK to npm
        working-directory: sdk/javascript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump TypeScript SDK version
        working-directory: sdk/typescript
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build

      - name: Bump Python SDK version
        working-directory: sdk/python
        run: |
          sed -i "s/version = .*/version = \"${{ needs.prepare.outputs.version }}\"/" pyproject.toml
          sed -i "s/self.version = .*/self.version = \"${{ needs.prepare.outputs.version }}\"/" src/panteao/client.py

      - name: Bump C++ SDK version
        working-directory: sdk/cpp
        run: |
          sed -i "s/sdkVersion(\".*\")/sdkVersion(\"${{ needs.prepare.outputs.version }}\")/" src/panteao_client.cpp

      - name: Bump Go SDK version
        working-directory: sdk/go
        run: |
          sed -i "s/const Version = \".*\"/const Version = \"${{ needs.prepare.outputs.version }}\"/" client.go

      - name: Bump Rust SDK version
        working-directory: sdk/rust
        run: |
          sed -i "s/version = \".*\"/version = \"${{ needs.prepare.outputs.version }}\"/" Cargo.toml
          sed -i "s/const VERSION: \&str = \".*\";/const VERSION: \&str = \"${{ needs.prepare.outputs.version }}\";/" src/lib.rs

      - name: Bump Ruby SDK version
        working-directory: sdk/ruby
        run: |
          sed -i "s/s.version     = '.*'/s.version     = '${{ needs.prepare.outputs.version }}'/" panteao-client.gemspec
          sed -i "s/VERSION = '.*'/VERSION = '${{ needs.prepare.outputs.version }}'/" lib/panteao_client.rb

      - name: Bump PHP SDK version
        run: |
          sed -i 's/"version": ".*"/"version": "${{ needs.prepare.outputs.version }}"/' composer.json
          sed -i "s/const VERSION = '.*'/const VERSION = '${{ needs.prepare.outputs.version }}'/" sdk/php/src/BdiClient.php

      - name: Bump Swift SDK version
        run: |
          sed -i "s/private static let version = \".*\"/private static let version = \"${{ needs.prepare.outputs.version }}\"/" sdk/swift/Sources/PanteaoClient/BdiClient.swift

      - name: Bump Java SDK version
        working-directory: sdk/java
        run: |
          sed -i "s/version = '.*'/version = '${{ needs.prepare.outputs.version }}'/" build.gradle
          sed -i "s/private static final String VERSION = \".*\";/private static final String VERSION = \"${{ needs.prepare.outputs.version }}\";/" src/main/java/io/panteao/BdiClient.java

      - name: Bump Kotlin SDK version
        working-directory: sdk/kotlin
        run: |
          sed -i "s/version = \".*\"/version = \"${{ needs.prepare.outputs.version }}\"/" build.gradle.kts
          sed -i "s/private const val VERSION = \".*\"/private const val VERSION = \"${{ needs.prepare.outputs.version }}\"/" src/main/kotlin/io/panteao/BdiClient.kt

      - name: Bump Scala SDK version
        working-directory: sdk/scala
        run: |
          sed -i "s/version := \".*\"/version := \"${{ needs.prepare.outputs.version }}\"/" build.sbt
          sed -i "s/val VERSION = \".*\"/val VERSION = \"${{ needs.prepare.outputs.version }}\"/" src/main/scala/io/panteao/BdiClient.scala

      - name: Bump R SDK version
        working-directory: sdk/r
        run: |
          sed -i "s/Version: .*/Version: ${{ needs.prepare.outputs.version }}/" DESCRIPTION
          sed -i "s/VERSION <- \".*\"/VERSION <- \"${{ needs.prepare.outputs.version }}\"/" R/client.R

      - name: Bump Objective-C SDK version
        working-directory: sdk/objc
        run: |
          sed -i "s/static NSString \*VERSION = @\".*\";/static NSString \*VERSION = @\"${{ needs.prepare.outputs.version }}\";/" src/BdiClient.m

      - name: Archive C++ SDK
        working-directory: sdk/cpp
        run: |
          tar -czf ../../panteao-cpp-${{ needs.prepare.outputs.version }}.tar.gz .

      - name: Archive C SDK
        working-directory: sdk/c
        run: |
          tar -czf ../../panteao-c-${{ needs.prepare.outputs.version }}.tar.gz .

      - name: Archive Shell SDK
        working-directory: sdk/shell
        run: |
          tar -czf ../../panteao-shell-${{ needs.prepare.outputs.version }}.tar.gz .

      - name: Build Python SDK
        working-directory: sdk/python
        run: |
          python -m pip install build
          python -m build

      - name: Publish Python SDK to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: sdk/python/dist/

      - name: Publish TypeScript SDK to npm
        working-directory: sdk/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Pack C# SDK
        working-directory: sdk/csharp
        run: |
          sed -i "s/<Version>.*<\/Version>/<Version>${{ needs.prepare.outputs.version }}<\/Version>/" Panteao.Client.csproj
          sed -i "s/sdkVersion = \".*\"/sdkVersion = \"${{ needs.prepare.outputs.version }}\"/" src/BdiClient.cs
          dotnet pack -c Release -o out

      - name: Bump Dart SDK version
        working-directory: sdk/dart
        run: |
          sed -i "s/version: .*/version: ${{ needs.prepare.outputs.version }}/" pubspec.yaml
          sed -i "s/final String sdkVersion = .*/final String sdkVersion = '${{ needs.prepare.outputs.version }}';/" lib/panteao.dart

      - name: Archive Dart SDK
        working-directory: sdk/dart
        run: |
          tar -czf ../../panteao-dart-${{ needs.prepare.outputs.version }}.tar.gz .



      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Publish Dart SDK to pub.dev
        working-directory: sdk/dart
        run: dart pub publish --force
        continue-on-error: true

      - name: NuGet Login
        uses: NuGet/login@v1
        with:
          user: kkphoenix

      - name: Publish C# SDK to NuGet
        working-directory: sdk/csharp
        run: dotnet nuget push out/*.nupkg --source https://api.nuget.org/v3/index.json --api-key $NUGET_AUTH_TOKEN --skip-duplicate
        continue-on-error: true

      - name: Publish Rust SDK to crates.io
        working-directory: sdk/rust
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
        continue-on-error: true

      - name: Publish Ruby SDK to RubyGems
        working-directory: sdk/ruby
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          gem build panteao-client.gemspec
          gem push panteao-client-${{ needs.prepare.outputs.version }}.gem
        continue-on-error: true

      - name: Publish Java SDK
        working-directory: sdk/java
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew publishToMavenLocal
          cd ~/.m2/repository/com/kkphoenix/panteao/${{ needs.prepare.outputs.version }}
          zip -r panteao-bundle.zip .
          curl -u "$MAVEN_USERNAME:$MAVEN_PASSWORD" -X POST "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC" -H "Content-Type: multipart/form-data" -F "bundle=@panteao-bundle.zip"
        continue-on-error: true

      - name: Commit Version Bumps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -a -m "chore: bump SDK versions to ${{ needs.prepare.outputs.version }}"
          git push origin HEAD:main
          
          # Create Go module specific tag
          git tag "sdk/go/v${{ needs.prepare.outputs.version }}"
          git push origin "sdk/go/v${{ needs.prepare.outputs.version }}"

      - name: Create GitHub Release and Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            panteao-cpp-${{ needs.prepare.outputs.version }}.tar.gz
            panteao-c-${{ needs.prepare.outputs.version }}.tar.gz
            panteao-shell-${{ needs.prepare.outputs.version }}.tar.gz
            panteao-dart-${{ needs.prepare.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
