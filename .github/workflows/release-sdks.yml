name: Release & Publish SDKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the SDKs (e.g. 1.1.0)'
        required: true
        default: '1.1.0'

permissions:
  contents: write

jobs:
  publish-sdks:
    name: Publish JS and TS SDKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # ── JAVASCRIPT SDK ──────────────────────────────────────────────────────
      - name: Bump JavaScript SDK version
        working-directory: sdk/javascript
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish JavaScript SDK to npm
        working-directory: sdk/javascript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── TYPESCRIPT SDK ──────────────────────────────────────────────────────
      - name: Bump TypeScript SDK version
        working-directory: sdk/typescript
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build

      - name: Publish TypeScript SDK to npm
        working-directory: sdk/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GITHUB RELEASE ──────────────────────────────────────────────────────
      - name: Create GitHub Release and Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}