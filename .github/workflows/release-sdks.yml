name: Release & Publish SDKs

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Engine Binaries"]
    types:
      - completed

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-sdks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Calculate next version
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'"
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          BASE_VERSION="1.1"

          git fetch --tags

          LAST_PATCH=$(git tag -l "v${BASE_VERSION}.*" \
            | sed "s/v${BASE_VERSION}.//" \
            | sort -n \
            | tail -n1)

          if [ -z "$LAST_PATCH" ]; then
            NEXT_PATCH=0
          else
            NEXT_PATCH=$((LAST_PATCH + 1))
          fi

          VERSION="${BASE_VERSION}.${NEXT_PATCH}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version $VERSION"

  publish-sdks:
    name: Publish JS and TS SDKs
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-generate CHANGELOG.md
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## ${{ needs.prepare.outputs.version }}" > LATEST.md
          echo "" >> LATEST.md
          if [ -n "$LAST_TAG" ]; then
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s" >> LATEST.md
          else
            git log -n 10 --pretty=format:"- %s" >> LATEST.md
          fi
          echo "" >> LATEST.md
          
          # Prepend for Dart (and future SDKs that need it)
          if [ -f sdk/dart/CHANGELOG.md ]; then
            cat LATEST.md sdk/dart/CHANGELOG.md > temp_changelog.md
            mv temp_changelog.md sdk/dart/CHANGELOG.md
          else
            cp LATEST.md sdk/dart/CHANGELOG.md
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump JavaScript SDK version
        working-directory: sdk/javascript
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish JavaScript SDK to npm
        working-directory: sdk/javascript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump TypeScript SDK version
        working-directory: sdk/typescript
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${{ needs.prepare.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm install
          npm run build

      - name: Bump Python SDK version
        working-directory: sdk/python
        run: |
          sed -i "s/version = .*/version = \"${{ needs.prepare.outputs.version }}\"/" pyproject.toml
          sed -i "s/self.version = .*/self.version = \"${{ needs.prepare.outputs.version }}\"/" src/panteao/client.py

      - name: Bump C++ SDK version
        working-directory: sdk/cpp
        run: |
          sed -i "s/sdkVersion(\".*\")/sdkVersion(\"${{ needs.prepare.outputs.version }}\")/" src/panteao_client.cpp

      - name: Archive C++ SDK
        working-directory: sdk/cpp
        run: |
          tar -czf ../../panteao-cpp-${{ needs.prepare.outputs.version }}.tar.gz .

      - name: Build Python SDK
        working-directory: sdk/python
        run: |
          python -m pip install build
          python -m build

      - name: Publish Python SDK to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages_dir: sdk/python/dist/

      - name: Publish TypeScript SDK to npm
        working-directory: sdk/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and Pack C# SDK
        working-directory: sdk/csharp
        run: |
          sed -i "s/<Version>.*<\/Version>/<Version>${{ needs.prepare.outputs.version }}<\/Version>/" Panteao.Client.csproj
          sed -i "s/sdkVersion = \".*\"/sdkVersion = \"${{ needs.prepare.outputs.version }}\"/" src/BdiClient.cs
          dotnet pack -c Release -o out

      - name: Bump Dart SDK version
        working-directory: sdk/dart
        run: |
          sed -i "s/version: .*/version: ${{ needs.prepare.outputs.version }}/" pubspec.yaml
          sed -i "s/final String sdkVersion = .*/final String sdkVersion = '${{ needs.prepare.outputs.version }}';/" lib/panteao.dart

      - name: Archive Dart SDK
        working-directory: sdk/dart
        run: |
          tar -czf ../../panteao-dart-${{ needs.prepare.outputs.version }}.tar.gz .

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Publish Dart SDK to pub.dev
        working-directory: sdk/dart
        run: dart pub publish --force
        continue-on-error: true

      - name: NuGet Login
        uses: NuGet/login@v1
        with:
          owner: ${{ github.repository_owner }}

      - name: Publish C# SDK to NuGet
        working-directory: sdk/csharp
        run: dotnet nuget push out/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
        continue-on-error: true

      - name: Create GitHub Release and Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            panteao-cpp-${{ needs.prepare.outputs.version }}.tar.gz
            panteao-dart-${{ needs.prepare.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
